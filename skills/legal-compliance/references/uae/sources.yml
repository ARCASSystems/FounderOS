# UAE legal & regulatory sources
# Primary sources only. Secondary (law firms, Big 4 guides) are interpretation
# context, not authority - do not list them here.
#
# Schema:
#   <source-key>:
#     name: human-readable name
#     url: primary URL
#     covers: [list of domains this source feeds]
#     last_checked_on: YYYY-MM-DD (the day a human last verified)
#     notes: optional - cadence hints, gotchas, sub-portals
#
# Update via: /founder-os:legal-update or /founder-os:legal-add-source
# Anything with last_checked_on >6 months ago will be flagged by the skill
# before answering, and SessionStart hook surfaces stale sources.

jurisdiction: UAE
display_name: United Arab Emirates
last_full_review: 2026-04-25

sources:
  legislation:
    name: UAE Federal Legislation Index
    url: https://legislation.ae
    covers: [federal-law-text, all-domains]
    last_checked_on: 2026-04-25
    notes: Authoritative source for federal decree-laws and cabinet decisions.

  mohre:
    name: Ministry of Human Resources and Emiratisation (MOHRE)
    url: https://mohre.gov.ae
    covers: [employment]
    last_checked_on: 2026-04-25
    notes: Federal Decree-Law 33/2021 + 2024 amendments. Verify Emiratisation thresholds annually (reset each calendar year-end).

  nafis:
    name: Nafis (Emiratisation Programme)
    url: https://nafis.gov.ae
    covers: [employment, emiratisation]
    last_checked_on: 2026-04-25

  fta:
    name: Federal Tax Authority (FTA)
    url: https://tax.gov.ae
    covers: [tax-vat, corporate-tax, excise]
    last_checked_on: 2026-04-25
    notes: Re-verify monthly. FTA Cabinet/Ministerial Decisions land continuously.

  emaratax:
    name: EmaraTax Portal
    url: https://emaratax.gov.ae
    covers: [tax-vat, registration, filing]
    last_checked_on: 2026-04-25

  mof:
    name: Ministry of Finance
    url: https://mof.gov.ae
    covers: [transfer-pricing, beps, international-tax-agreements]
    last_checked_on: 2026-04-25

  icp:
    name: Federal Authority for Identity, Citizenship, Customs and Port Security (ICP)
    url: https://icp.gov.ae
    covers: [visas-immigration]
    last_checked_on: 2026-04-25
    notes: Re-verify quarterly. Visa rules shift frequently.

  gdrfa:
    name: General Directorate of Residency and Foreigners Affairs (Dubai)
    url: https://gdrfa.gov.ae
    covers: [visas-immigration]
    last_checked_on: 2026-04-25

  golden_visa:
