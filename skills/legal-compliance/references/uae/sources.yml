    covers: [difc-all-domains, data-protection, employment, courts]
    last_checked_on: 2026-04-25
    notes: DIFC Data Protection Amendment Law No. 1 of 2025 effective 15 Jul 2025. Separate common-law regime from federal UAE.

  adgm:
    name: Abu Dhabi Global Market (ADGM)
    url: https://adgm.com
    covers: [adgm-all-domains, data-protection, employment, courts]
