name: LinkedIn Pack Acceptance

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  acceptance:
    name: Privacy, determinism, contracts, and runner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tracked LinkedIn pack acceptance suite
        run: python3 -m unittest discover -s .github/tests -p "test_*.py" -v
